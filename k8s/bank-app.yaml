apiVersion: apps/v1
kind: Deployment
metadata:
  name: bank-app
  namespace: bank-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bank-app
  template:
    metadata:
      labels:
        app: bank-app
    spec:
      containers:
        - name: bank-app
          image: localhost:30500/bank-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: AllowedHosts
              value: "*"
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: ConnectionStrings__DefaultConnection
              value: "Host=postgres;Port=5432;Database=$(POSTGRES_DB);Username=$(POSTGRES_USER);Password=$(POSTGRES_PASSWORD)"
            - name: Keycloak__Authority
              value: "https://auth.madpro.dk/realms/bank"
            - name: Keycloak__PublicUrl
              value: "https://auth.madpro.dk"
            - name: Keycloak__Realm
              value: "bank"
            - name: Keycloak__ClientId
              value: "bank-web"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: bank-app
  namespace: bank-app
spec:
  selector:
    app: bank-app
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bank-app
  namespace: bank-app
spec:
  ingressClassName: traefik
  rules:
    - host: bank.madpro.dk
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bank-app
                port:
                  number: 8080
