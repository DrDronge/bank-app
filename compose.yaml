services:
  postgres:
    image: cgr.dev/chainguard/postgres:latest
    container_name: postgres
    volumes:
      - postgresql_data:/var/lib/postgresql
      - ./initdb.d:/docker-entrypoint-initdb.d
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    networks:
      - app_network
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${DB_USER}", "-d", "${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak-db:
    image: cgr.dev/chainguard/postgres:latest
    container_name: keycloak_db
    volumes:
      - keycloak_db_data:/var/lib/postgresql
    environment:
      POSTGRES_DB: ${KC_DB_NAME}
      POSTGRES_USER: ${KC_DB_USER}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD}
    networks:
      - app_network
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${KC_DB_USER}", "-d", "${KC_DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.7
    container_name: keycloak
    # Use start-dev for local dev (embedded H2, no TLS required).
    # For production: switch to `start` and add KC_HOSTNAME, KC_HTTPS_* env vars.
    command: start-dev --import-realm
    env_file:
      - .env
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/${KC_DB_NAME}
      KC_DB_USERNAME: ${KC_DB_USER}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    ports:
      - "127.0.0.1:8180:8080"
    networks:
      - app_network
    depends_on:
      keycloak-db:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bank_api
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - app_network
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}"
      # Backend uses internal Docker hostname; frontend gets the public URL via /api/config
      Keycloak__Authority: http://keycloak:8080/realms/bank
      Keycloak__PublicUrl: http://localhost:8180
      Keycloak__Realm: bank
      Keycloak__ClientId: bank-web
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    volumes:
      - pgadmin_working_dir:/var/lib/pgadmin
      - pgadmin_config_dir:/pgadmin4
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "127.0.0.1:5433:80"
    networks:
      - app_network
    depends_on:
      postgres:
        condition: service_healthy

  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    ports:
      - "127.0.0.1:5434:3000"
    networks:
      - app_network
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgresql_data:
    driver: local
  pgadmin_working_dir:
    driver: local
  pgadmin_config_dir:
    driver: local
  keycloak_db_data:
    driver: local

networks:
  app_network:
    driver: bridge
